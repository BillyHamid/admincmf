<div class="flex h-screen w-full">
  <div class="flex-1 overflow-y-auto p-4">
    <div class="page-header pl-8 pr-8 pt-4 pb-2 flex justify-between">
      <div >
        <h1 class="text-2xl font-bold">Gestion des agences</h1>
        <p class="font-extralight mt-1">
          Liste des agences
        </p>
      </div>
      <div class="mt-4">
        <app-agence-form [forEdit]="false" (onDone)="loadAgenceList()"> </app-agence-form>
      </div>
    </div>
    <div class="card shadow-md bg-white border-2 m-8 p-3">
      <p-table [paginator]="true" [loading]="loading" [rows]="20" [value]="agences" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
          <tr>
            <th>Nom de l'agence</th>
            <th>Adresse</th>
            <th>Contacts</th>
            <th>Gestionnaire</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-agence>
          <tr>
            <td>
              <i class="pi pi-building"></i>
              {{ agence?.agencyName }}
            </td>
            <td>{{ agence.agencyAdress }}</td>
            <td>{{ agence.agencyPhone1 }}</td>
            <td>{{ agence?.gestionnaire?.firstname }} {{ agence?.gestionnaire?.lastname }}</td>
            <td>
              <p-tag (click)="toggleStatus(agence)" class="hover:cursor-pointer" *ngIf="agence.active" severity="success" value="Active" />
              <p-tag (click)="toggleStatus(agence)" class="hover:cursor-pointer" *ngIf="!agence.active" severity="danger" value="Désactivée" />
            </td>
            <td class="flex">
              <app-agence-form [forEdit]="true" [target]="agence" (onDone)="loadAgenceList()"> </app-agence-form>
              <button (click)="handleDelete(agence)" pButton severity="danger" type="button" icon="pi pi-trash" class="p-button"></button>

            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td style="text-align: center" class="" colspan="5">
              <div>
                <img style="margin: auto" ngSrc="assets/icons/empty.png" alt="" height="50" width="50">
                <h3 class="font-light mt-2">Aucune agence trouvée</h3>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
    <p-confirmDialog appendTo="body"></p-confirmDialog>
    <p-toast />
  </div>
</div>
