<button *ngIf="!forEdit" (click)="showDialog()" pButton type="button" label="Nouvelle agence" icon="pi pi-plus" class="p-button-outlined"></button>
<button *ngIf="forEdit"  (click)="showDialog()" pButton type="button" icon="pi pi-pencil" class="p-button mr-2"></button>
<div class="card flex justify-center">
  <p-dialog [header]="forEdit ? 'Edit agence' : 'Nouvelle agence'" [modal]="true" [(visible)]="visible" [style]="{ width: '45%' }">
    <form [formGroup]="agenceForm" action="">
      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="agencyName">Nom <span class="text-red-700">*</span> </label>
          <input formControlName="agencyName" id="agencyName" class="adouk-input"/>
        </div>
        <div class="field flex-1 gap-4 mb-4">
          <label for="agencyAdress">Adresse <span class="text-red-700">*</span></label>
          <input formControlName="agencyAdress" id="agencyAdress" class="adouk-input"/>
        </div>
      </div>

      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="agencyPhone1">Contact 1 <span class="text-red-700">*</span></label>
          <input formControlName="agencyPhone1" id="agencyPhone1" type="tel" class="adouk-input"/>
        </div>
        <div class="field flex-1 gap-4 mb-4">
          <label for="agencyPhone2">Contact 2</label>
          <input formControlName="agencyPhone2" id="agencyPhone2" type="tel" class="adouk-input"/>
        </div>
      </div>
      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="agencyLongitude">Longitude <span class="text-red-700">*</span></label>
          <input formControlName="agencyLongitude" id="agencyLongitude" type="text" class="adouk-input"/>
        </div>
        <div class="field flex-1 gap-4 mb-4">
          <label for="agencyLatitude">Latitude <span class="text-red-700">*</span></label>
          <input formControlName="agencyLatitude" id="agencyLatitude" type="text" class="adouk-input"/>
        </div>
      </div>
      <div class="field flex-1 gap-4 mb-4">
        <label for="agenceId">Gestionnaire de l'agence </label>
        <div class="card flex justify-center">
          <p-dropdown
            [filter]="true"
            appendTo="body"
            formControlName="gestionnaireId"
            [options]="agents"
            optionValue="agent.uuid"
            id="agenceId"
            class="adouk-select"
          >
            <!-- Template pour la liste -->
            <ng-template let-agent pTemplate="item">
              <div class="flex flex-column">
                <span class="font-medium">{{ agent?.agent.firstname }} {{ agent?.agent.lastname }}</span>
              </div>
            </ng-template>

            <!-- Template pour l'élément sélectionné -->
            <ng-template let-agent pTemplate="selectedItem">
              <div class="flex align-items-center">
                <span>{{ agent?.agent.firstname }} {{ agent?.agent.lastname }}</span>
              </div>
            </ng-template>
          </p-dropdown>
        </div>
      </div>

      <div class="flex justify-end gap-2">
        <p-button label="Fermer" severity="danger" (click)="visible = false" />
        <p-button [disabled]="agenceForm.invalid" [loading]="processing" label="Enregistrer" (click)="saveForm()" />
      </div>
    </form>
  </p-dialog>
</div>
<p-toast />
