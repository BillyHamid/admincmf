<button *ngIf="mode === 'create'" (click)="showDialog()" pButton type="button" label="Ajouter un utilisateur" icon="pi pi-plus" class="p-button-outlined"></button>
<button *ngIf="mode === 'edit'" (click)="showDialog()" pButton type="button" icon="pi pi-pencil" class="p-button"></button>

<div class="card flex justify-center">
  <p-dialog [header]="mode === 'create' ? 'Nouvel utilisateur': 'Mise à utilisateur'" [modal]="true" [(visible)]="visible" [style]="{ width: '45%' }">
    <form [formGroup]="userForm" action="">
      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="lastname">Nom <span class="text-red-700">*</span> </label>
          <input formControlName="lastname" id="lastname" class="adouk-input"/>
        </div>
        <div class="field flex-1 gap-4 mb-4">
          <label for="firstname">Prénom (s) <span class="text-red-700">*</span></label>
          <input formControlName="firstname" id="firstname" class="adouk-input"/>
        </div>
      </div>

      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="email">Adresse email <span class="text-red-700">*</span></label>
          <input formControlName="email" id="email" type="email" class="adouk-input"/>
        </div>
        <div class="field flex-1 gap-4 mb-4">
          <label for="agenceId">Agence <span class="text-red-700">*</span> </label>
          <div class="card flex justify-center">
            <p-dropdown [filter]="true" appendTo="body" formControlName="agence" [options]="agences"  optionLabel="agencyName" id="agenceId" class="adouk-select" />
          </div>
        </div>
      </div>
      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="phone">Contact <span class="text-red-700">*</span></label>
          <input formControlName="phone" id="phone" type="tel" class="adouk-input"/>
        </div>
        <div class="field flex-1 gap-4 mb-4">
          <label for="role">Role <span class="text-red-700">*</span> </label>
          <div class="card flex justify-center">
            <p-dropdown [filter]="true" appendTo="body" formControlName="roleId" [options]="roles"  optionLabel="label" id="role" class="adouk-select" />
          </div>
        </div>
      </div>
      <div class="flex justify-end gap-2">
        <p-button label="Fermer" severity="danger" (click)="visible = false" />
        <p-button [disabled]="userForm.invalid" [loading]="processing" label="Enregistrer" (click)="saveForm()" />
      </div>
    </form>
  </p-dialog>
</div>
<p-toast />
