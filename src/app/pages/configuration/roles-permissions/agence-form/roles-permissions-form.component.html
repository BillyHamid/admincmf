<button *ngIf="mode === 'create'" (click)="showDialog()" pButton type="button" label="Nouveau role" icon="pi pi-plus" class="p-button-outlined"></button>
<button *ngIf="mode === 'edit'" (click)="showDialog()" pButton type="button" icon="pi pi-pencil" class="p-button"></button>
<div class="card flex justify-center">
  <p-dialog [header]="mode === 'create' ? 'Nouveau role': 'Mise à jour role'" [modal]="true" [(visible)]="visible" [style]="{ width: '35%' }">
    <form [formGroup]="roleForm" action="">
      <div class="flex gap-4">
        <div class="field flex-1 gap-4 mb-4">
          <label for="label">Nom <span class="text-red-700">*</span> </label>
          <input formControlName="label" id="label" class="adouk-input"/>
        </div>

      </div>
      <div class="field flex-1 gap-4 mb-4">
        <label for="permissionsId">Permissions <span class="text-red-700">*</span> </label>
        <div class="card flex justify-center">
          <p-multiSelect appendTo="body" formControlName="permissions" [options]="permissions"  optionLabel="label" id="permissionsId" class="adouk-select" />
        </div>
      </div>
      <div class="flex">
        <div class="field flex-1 gap-4 mb-6">
          <label for="description">Description <span class="text-red-700">*</span></label>
          <textarea formControlName="description" id="description" class="adouk-input" ></textarea>
        </div>
      </div>

      <div class="flex justify-end gap-2">
        <p-button label="Fermer" severity="danger" (click)="visible = false" />
        <p-button [disabled]="roleForm.invalid" [loading]="processing" label="Enregistrer" (click)="saveForm()" />
      </div>
    </form>
  </p-dialog>
</div>
<p-toast />
