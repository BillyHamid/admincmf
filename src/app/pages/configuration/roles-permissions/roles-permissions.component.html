<div class="flex h-screen w-full">
  <div class="flex-1 overflow-y-auto p-4">
    <div class="page-header pl-8 pr-8 pt-4  pb-2 flex justify-between">
      <div >
        <h1 class="text-2xl font-bold">Gestion des roles et permissions</h1>
        <p class="font-extralight mt-1">
          Liste des roles avec leurs permissions associées
        </p>
      </div>
      <div class="mt-4">
        <app-roles-permissions-form mode="create" (onDone)="loadRoleList()"> </app-roles-permissions-form>
      </div>
    </div>
    <div class="card shadow-md bg-white border-2 m-8 p-3">
      <p-table [paginator]="true" [loading]="loading" [rows]="20" [value]="roles" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
          <tr>
            <th>Libellé</th>
            <th>Description</th>
            <th>Permissions</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-role>
          <tr>
            <td>{{ role?.label }}</td>
            <td>{{role?.description}}</td>
            <td style="max-width: 300px">
              <p-tag class="m-2" *ngFor="let perm of role.permissions" severity="secondary" [value]="perm?.label" />
            </td>
            <td>
              <div class="flex gap-2">
                <app-roles-permissions-form [target]="role" mode="edit" (onDone)="loadRoleList()"> </app-roles-permissions-form>
                <button (click)="handleDelete(role)" pButton severity="danger" type="button" icon="pi pi-trash" class="p-button"></button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td style="text-align: center" class="" colspan="5">
              <div>
                <img style="margin: auto" ngSrc="assets/icons/empty.png" alt="" height="50" width="50">
                <h3 class="font-light mt-2">Aucun role trouvé</h3>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
    <p-confirmDialog appendTo="body"></p-confirmDialog>
    <p-toast />
  </div>
</div>
