<button *ngIf="!forEdit" (click)="showDialog()" pButton type="button" label="Nouveau service" icon="pi pi-plus" class="p-button-outlined"></button>
<button *ngIf="forEdit" (click)="showDialog()" pButton type="button" icon="pi pi-pencil" class="p-button mr-2"></button>

<div class="card flex justify-center">
  <p-dialog [header]="forEdit ? 'Modifier le service' : 'Nouveau service'" [(visible)]="visible" [modal]="true" [style]="{ width: '45%' }">
    <form [formGroup]="faqForm">
      <div class="field mb-4">
        <label for="code">Code <span class="text-red-700">*</span></label>
        <input formControlName="code" id="code" class="adouk-input" />
      </div>

      <div class="field mb-4">
        <label for="libelleService">Libellé <span class="text-red-700">*</span></label>
        <input formControlName="libelleService" id="libelleService" class="adouk-input" />
      </div>

      <div class="field mb-4">
        <label for="descriptionService">Description <span class="text-red-700">*</span></label>
        <textarea formControlName="descriptionService" id="descriptionService" rows="5" class="adouk-input"></textarea>
      </div>

      <div class="flex justify-end gap-2">
        <p-button label="Fermer" severity="danger" (click)="visible = false" />
        <p-button [disabled]="faqForm.invalid" [loading]="processing" label="Enregistrer" (click)="saveForm()" />
      </div>
    </form>
  </p-dialog>
</div>
